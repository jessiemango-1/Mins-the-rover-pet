<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">

<style>
body {margin:0; font-family:'Outfit',sans-serif; background:#fdfbff; text-align:center;}
header {background:white; padding:20px; box-shadow:0 4px 10px rgba(0,0,0,0.05);}
header a {margin:0 15px; text-decoration:none; color:#666; font-weight:600;}
h1 {margin-top:40px;}
.cart {max-width:500px; margin:50px auto; text-align:left;}
.cart-item {background:white; padding:20px; border-radius:20px; margin-bottom:15px; box-shadow:0 6px 15px rgba(0,0,0,0.05);}
.cart-item span {float:right; font-weight:600;}
.total {text-align:right; font-size:20px; margin-top:20px; font-weight:600;}
.checkout-btn {margin-top:20px; padding:12px 25px; background:#6c8cff; color:white; border:none; border-radius:20px; cursor:pointer; font-weight:600;}
.checkout-btn:hover {background:#4a6cff;}
</style>
</head>
<body>

<header>
  <a href="home.html">Home</a>
  <a href="index.html">Products</a>
</header>

<h1>Your Cart 🛒</h1>

<div class="cart" id="cart"></div>

<div class="total" id="total"></div>

<button class="checkout-btn" onclick="completeOrder()">Complete Order</button>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let cartDiv = document.getElementById('cart');
let totalDiv = document.getElementById('total');
let total = 0;

if(cart.length === 0){
    cartDiv.innerHTML = "<p>Your cart is empty.</p>";
}else{
    cart.forEach(item=>{
        let div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `${item.name} <span>$${item.price.toFixed(2)}</span>`;
        cartDiv.appendChild(div);
        total += item.price;
    });
    totalDiv.innerText = 'Total: $' + total.toFixed(2);
}

function completeOrder(){
    alert('Thank you! Your adventure order is complete 🚀');
    localStorage.removeItem('cart');
    location.reload();
}
</script>

</body>
</html>
