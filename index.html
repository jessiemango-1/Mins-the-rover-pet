<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mins Store</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0; 
  font-family:'Outfit',sans-serif; 
  background:linear-gradient(135deg,#fdfbff,#e6f0ff); 
  text-align:center;
}

header {
  background:white; 
  padding:20px; 
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

header a {
  margin:0 15px; 
  text-decoration:none; 
  color:#666; 
  font-weight:600;
}

h1 {
  margin-top:40px;
}

.products {
  display:flex; 
  justify-content:center; 
  gap:30px; 
  flex-wrap:wrap; 
  padding:50px 20px;
}

.card {
  background:white; 
  width:250px; 
  padding:25px; 
  border-radius:20px; 
  box-shadow:0 8px 20px rgba(0,0,0,0.05); 
  transition:0.3s;
}

.card:hover {
  transform:translateY(-8px);
}

.price {
  color:#6c8cff; 
  font-size:20px; 
  margin:15px 0; 
  font-weight:600;
}

button {
  padding:10px 20px; 
  border:none; 
  border-radius:20px; 
  background:#6c8cff; 
  color:white; 
  cursor:pointer; 
  font-weight:600;
}

button:hover {
  background:#4a6cff;
}

/* New bigger header image */
.header-img {
  width:90%;        /* makes the image 90% of page width */
  max-width:800px;  /* prevents it from being too huge */
  height:auto;      /* keeps proportions correct */
  margin-top:20px;  /* space below the header */
  border-radius:20px; /* optional rounded corners */
}
</style>
</head>
<body>

<header>
  <a href="home.html">Home</a>
  <a href="features.html">Features</a>
  <a href="checkout.html">Cart</a>
</header>

<!-- Mins Image -->
<img src="mins.png" alt="Mins the Rover Pet" class="header-img">

<h1>Our Products </h1>

<div class="products">
  <div class="card">
    <h2>Mins the Rover</h2>
    <p>Smart Adventure Companion</p>
    <div class="price">$39.99</div>
    <button onclick="addToCart('Mins the Rover', 39.99)">Add to Cart</button>
  </div>

  <div class="card">
    <h2>Mins Mini</h2>
    <p>Smaller indoor version</p>
    <div class="price">$24.99</div>
    <button onclick="addToCart('Mins Mini', 24.99)">Add to Cart</button>
  </div>

  <div class="card">
    <h2>Mins Explorer Pack</h2>
    <p>Accessories + Charging Dock</p>
    <div class="price">$19.99</div>
    <button onclick="addToCart('Mins Explorer Pack', 19.99)">Add to Cart</button>
  </div>
</div>

<script>
function addToCart(name, price){
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    cart.push({name, price});
    localStorage.setItem('cart', JSON.stringify(cart));
    alert(name + ' added to cart!');
}
</script>

</body>
</html>
