<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<style>
body{
  font-family:Arial;
  background:#000;
  color:white;
  padding:60px;
}
.item{
  margin-bottom:15px;
}
button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:30px;
  background:white;
  cursor:pointer;
  font-weight:600;
}
</style>
</head>
<body>

<h1>Checkout</h1>
<div id="cart-items"></div>
<h3 id="total"></h3>

<button onclick="placeOrder()">Place Order</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let cartContainer = document.getElementById("cart-items");
let total = 0;

cart.forEach(item=>{
  let div = document.createElement("div");
  div.className="item";
  div.innerText = item.name + " - $" + item.price;
  cartContainer.appendChild(div);
  total += item.price;
});

document.getElementById("total").innerText="Total: $" + total;

function placeOrder(){
  localStorage.removeItem("cart");
  alert("Order Confirmed 🚀 Thank you for supporting Mins!");
  window.location.href="index.html";
}
</script>

</body>
</html>
